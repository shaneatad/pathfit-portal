            const [attachments, setAttachments] = useState([
                {
                    id: 'att-default-1',
                    name: `${currentUser.name.replace(/\s+/g, '_')}_${assignment.subjectCode || 'PATHFIT'}_Log.pdf`,
                    type: 'pdf',
                    title: assignment.title,
                    content: `STUDENT: ${currentUser.name}\nSECTION: ${activeSection.sectionName}\nTASK: ${assignment.title}\nSTATUS: Verified Student Work Submission.`
                }
            ]);
            
            const [linkUrl, setLinkUrl] = useState('');
            const [linkTitle, setLinkTitle] = useState('');
            const [remarks, setRemarks] = useState('');
            const [isConfirmed, setIsConfirmed] = useState(false);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                let fileType = 'file';
                if (file.type.includes('image')) fileType = 'image';
                else if (file.type.includes('pdf')) fileType = 'pdf';
                else if (file.type.includes('video')) fileType = 'video';

                const newAtt = {
                    id: 'att-' + Date.now(),
                    name: file.name,
                    type: fileType,
                    size: (file.size / 1024).toFixed(1) + ' KB',
                    url: fileType === 'image' ? URL.createObjectURL(file) : null,
                    content: `Attached file: ${file.name} (${file.type || 'Binary'})`
                };

                setAttachments(prev => [...prev, newAtt]);
            };

            const handleAddLink = () => {
                if (!linkUrl.trim()) return;
                const formattedUrl = linkUrl.startsWith('http') ? linkUrl : 'https://' + linkUrl;
                const newAtt = {
                    id: 'att-' + Date.now(),
                    name: linkTitle.trim() || linkUrl,
                    type: 'link',
                    url: formattedUrl,
                    content: `External Web/Cloud Link: ${formattedUrl}`
                };
                setAttachments(prev => [...prev, newAtt]);
                setLinkUrl('');
                setLinkTitle('');
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!isConfirmed) return;

                const newSub = {
                    id: 'sub-' + Date.now(),
                    assignmentId: assignment.id,
                    studentId: currentUser.id || 'std-101',
                    studentName: currentUser.name,
                    studentIdNo: currentUser.studentIdNo || '2025-01892',
                    courseProgram: currentUser.courseProgram || activeSection.courseProgram,
                    sectionName: activeSection.sectionName,
                    submittedAt: new Date().toLocaleString(),
                    status: 'Turned In',

                    feedback: remarks ? `Student note: ${remarks}` : '',
                    attachments: attachments
                };

                            </button>
                        </div>

                            <div className="flex space-x-2 bg-slate-100 p-1 rounded-xl">

                                    type="button"
                                    onClick={() => setAttachMode('file')}

                                    }`}

                                    <span>Upload File</span>
                                </button>

                                <button
                                    type="button"
                                    onClick={() => setAttachMode('link')}
                                    className={`flex-1 py-1.5 rounded-lg font-bold transition flex items-center justify-center space-x-1.5 ${
                                        attachMode === 'link' ? 'bg-white text-blue-900 shadow' : 'text-slate-600 hover:text-blue-900'
                                    }`}
                                >
                                    <i className="fa-solid fa-link"></i>
                                    <span>Add Link</span>
                                </button>
                            </div>

                            {attachMode === 'file' ? (
                                <div className="bg-blue-50/70 border border-blue-200 p-3 rounded-2xl space-y-2 text-center">
                                    <i className="fa-solid fa-file-arrow-up text-blue-600 text-2xl mb-1"></i>
                                    <p className="text-slate-600 font-medium">Select JPEG, PNG, PDF, or MP4 video</p>
                                    <input
                                        type="file"
                                        accept="image/*,.pdf,.doc,.docx,.mp4,.mov"
                                        onChange={handleFileUpload}
                                        className="block w-full text-xs text-slate-500 file:mr-3 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-blue-700 file:text-white cursor-pointer"
                                    />
                                </div>
                            ) : (
                                <div className="bg-blue-50/70 border border-blue-200 p-3 rounded-2xl space-y-2">
                                    <input
                                        value={linkTitle}
                                        onChange={(e) => setLinkTitle(e.target.value)}
                                        placeholder="Link Title (e.g. Google Drive Workout Video)"
                                        className="w-full bg-white border border-slate-300 rounded-xl p-2.5 text-xs"
                                    />
                                    <div className="flex space-x-2">
                                        <input
                                            value={linkUrl}
                                            onChange={(e) => setLinkUrl(e.target.value)}
                                            placeholder="Paste URL (e.g. https://drive.google.com/...)"
                                            className="flex-1 bg-white border border-slate-300 rounded-xl p-2.5 text-xs"
                                        />
                                        <button type="button" onClick={handleAddLink} className="btn-navy-primary font-bold px-4 rounded-xl text-xs">Attach</button>
                                    </div>
                                </div>
                            )}

                            <div className="space-y-1.5">
                                <span className="font-bold text-slate-700 text-[11px] uppercase tracking-wider block">Attachments ({attachments.length}):</span>
                                {attachments.map((att) => (
                                    <div key={att.id} className="bg-white border border-slate-200 p-2.5 rounded-xl flex items-center justify-between text-xs">
                                        <div className="truncate max-w-[80%]">
                                            <span className="font-bold text-slate-800 block truncate">{att.name}</span>
                                            <span className="text-[10px] text-slate-400 font-mono">{att.type.toUpperCase()}</span>
                                        </div>
                                        <button type="button" onClick={() => setAttachments(attachments.filter(a => a.id !== att.id))} className="text-slate-400 hover:text-rose-600">

                                    onChange={(e) => setRemarks(e.target.value)}

                                    className="w-full bg-slate-50 border border-slate-300 rounded-xl p-2.5 text-xs text-slate-800"
                                ></textarea>
                            </div>

                            <div className={`p-3.5 rounded-2xl border transition-all ${isConfirmed ? 'bg-emerald-50 border-emerald-300' : 'bg-amber-50 border-amber-300'}`}>
                                <div className="flex items-center justify-between">

                                            <p className="text-[11px] text-slate-600">Toggle switch to confirm final turn-in.</p>
                                        </div>
                                    </div>
                                    <label className="relative inline-flex items-center cursor-pointer shrink-0">
                                        <input type="checkbox" checked={isConfirmed} onChange={(e) => setIsConfirmed(e.target.checked)} className="sr-only peer" />

                            </div>

                            <button
                                type="button"
                                onClick={handleSubmit}
                                disabled={!isConfirmed}
                                className={`px-5 py-2 font-bold rounded-xl text-xs flex items-center space-x-1.5 transition ${
                                    isConfirmed ? 'bg-emerald-600 text-white shadow-md' : 'bg-slate-300 text-slate-500 cursor-not-allowed'
                                }`}

                            </button>

        function App() {
            const getInitialState = (key, fallback) => {
                try {
                    const saved = localStorage.getItem(key);
                    return saved ? JSON.parse(saved) : fallback;
                } catch (e) {
                    return fallback;
                }
            };

            // Global Accounts & Active User State
            const [accounts, setAccounts] = useState(() => getInitialState('pathfit_accounts_registry_v2', INITIAL_REGISTERED_ACCOUNTS));
            const [currentUserId, setCurrentUserId] = useState(() => getInitialState('pathfit_active_userid_v2', 'usr-admin-1'));

            // Core Application Data State
            const [sections, setSections] = useState(() => getInitialState('pathfit_sections', INITIAL_SECTIONS));
            const [activeSectionId, setActiveSectionId] = useState(() => getInitialState('pathfit_activeSectionId', 'sec-pf1-bsit1a'));
            const [assignments, setAssignments] = useState(() => getInitialState('pathfit_assignments', INITIAL_ASSIGNMENTS));
            const [materials, setMaterials] = useState(() => getInitialState('pathfit_materials', INITIAL_MATERIALS));
            const [announcements, setAnnouncements] = useState(() => getInitialState('pathfit_announcements', INITIAL_ANNOUNCEMENTS));
            const [submissions, setSubmissions] = useState(() => getInitialState('pathfit_submissions', INITIAL_SUBMISSIONS));
            const [pendingRequests, setPendingRequests] = useState(() => getInitialState('pathfit_pendingRequests', INITIAL_PENDING_ENROLLMENTS));

            useEffect(() => { localStorage.setItem('pathfit_accounts_registry_v2', JSON.stringify(accounts)); }, [accounts]);
            useEffect(() => { localStorage.setItem('pathfit_active_userid_v2', JSON.stringify(currentUserId)); }, [currentUserId]);
            useEffect(() => { localStorage.setItem('pathfit_sections', JSON.stringify(sections)); }, [sections]);

            const [isAddSectionOpen, setIsAddSectionOpen] = useState(false);
            const [isManageCategoriesOpen, setIsManageCategoriesOpen] = useState(false);

            const sectionMaterials = materials.filter(m => m.sectionId === activeSection.id);
            const sectionStudents = accounts.filter(s => (s.role === 'student' && s.sectionId === activeSection.id) || (s.enrolledSectionIds && s.enrolledSectionIds.includes(activeSection.id)));

                e.preventDefault();

                    setRegMessage('Please fill out all required fields.');

                    id: 'usr-' + Date.now(),
                    studentIdNo: regForm.studentIdNo,
                    name: regForm.name,
                    nickname: regForm.nickname || regForm.name.split(' ')[0],
                    role: regForm.role,
                    isPrimaryAdmin: false,
                    dob: regForm.dob,
                    gender: regForm.gender,
                    email: regForm.email,
                    courseProgram: regForm.courseProgram,
                    sectionName: regForm.sectionName,
                    sectionId: activeSection.id,
                    enrolledSectionIds: [activeSection.id],
                    emergencyContact: regForm.emergencyContact || 'Parent/Guardian - Contact on File',
                    adviser: regForm.adviser || 'Prof. Shane Ian Atad',
                    avatar: `https://images.unsplash.com/photo-${1535713875002 + accounts.length}?auto=format&fit=crop&w=150&q=80`,

                    name: '',
                    nickname: '',
                    studentIdNo: '',
                    role: 'student',
                    email: '',
                    courseProgram: 'BS Information Technology',
                    sectionName: 'BSIT-1A',
                    dob: '2005-01-01',
                    gender: 'Male',
                    emergencyContact: '',
                    adviser: 'Prof. Shane Ian Atad'

                        return { ...a, role: newRole };
                    }
                    return a;
                }));
            };

            const handleTransferPrimaryAdmin = (targetUserId) => {
                setAccounts(prev => prev.map(a => {
                    if (a.id === targetUserId) {
                        return { ...a, role: 'admin', isPrimaryAdmin: true };

                    return { ...a, isPrimaryAdmin: false };
                }));
                setTransferAdminTarget(null);
            };

            const handleEnrollByCode = (code) => {
                if (!code.trim()) return;
                const targetSec = sections.find(s => s.joinCode.toLowerCase() === code.trim().toLowerCase());
                
                if (!targetSec) {
                    setEnrollmentStatusMsg('Invalid Join Code. Please check with your instructor.');
                    return;
                }

                if (currentUser.enrolledSectionIds && currentUser.enrolledSectionIds.includes(targetSec.id)) {
                    setEnrollmentStatusMsg(`You are already enrolled in ${targetSec.subjectCode} (${targetSec.sectionName})!`);
                    return;

                const newReq = {
                    id: 'req-' + Date.now(),
                    studentId: currentUser.id,
                    studentIdNo: currentUser.studentIdNo,
                    studentName: currentUser.name,
                    nickname: currentUser.nickname,
                    email: currentUser.email,
                    courseProgram: currentUser.courseProgram,
                    requestedSectionId: targetSec.id,
                    requestedSubject: `${targetSec.subjectCode} (${targetSec.sectionName})`,
                    joinCodeUsed: code.toUpperCase(),
                    requestedAt: new Date().toLocaleString()
                };

                setPendingRequests(prev => [newReq, ...prev]);

                        return { ...std, enrolledSectionIds: updatedEnrolled };

                    return std;

                    }
                    return ann;
                }));

                setNewCommentText(prev => ({ ...prev, [announcementId]: '' }));
            };

            const handleSaveGrade = (submissionId, grade, feedback) => {
                setSubmissions(prev => prev.map(sub => {
                    if (sub.id === submissionId) {
                        return { ...sub, grade, feedback, status: 'Graded' };

                                            <tr>
                                                <th className="p-4">Student Info</th>
                                                <th className="p-4">Submitted Date</th>
                                                <th className="p-4">Grade Score</th>
                                                <th className="p-4 text-right">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {submissions.map(sub => (
                                                <tr key={sub.id}>
                                                    <td className="p-4 font-bold text-blue-950">{sub.studentName}</td>
                                                    <td className="p-4 text-slate-500">{sub.submittedAt}</td>
                                                    <td className="p-4 font-extrabold text-emerald-700">{sub.grade !== null ? `${sub.grade} pts` : 'Ungraded'}</td>
                                                    <td className="p-4 text-right">
                                                        <button onClick={() => setInspectSubmission(sub)} className="btn-navy-primary font-bold px-3 py-1.5 rounded-xl text-xs shadow">
                                                            Inspect
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* TAB 5: ROSTER */}
                        {activeTab === 'roster' && (
                            <div className="space-y-6">
                                <div className="glass-card rounded-3xl p-5 border border-blue-200">
                                    <h3 className="font-google font-bold text-lg text-blue-950">Class Enrolled Roster</h3>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {sectionStudents.map(std => (
                                        <div key={std.id} className="glass-card rounded-3xl p-4 border border-slate-200 flex items-center justify-between shadow-sm">
                                            <div className="flex items-center space-x-3">
                                                <img src={std.avatar} className="w-11 h-11 rounded-2xl object-cover" />
                                                <div className="text-xs">
                                                    <strong className="text-blue-950 block text-sm">{std.name}</strong>
                                                    <span className="text-[10px] text-slate-500 font-mono">ID: {std.studentIdNo}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {}
                        {activeTab === 'accounts' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    {/* Account Registration Form */}
                                    <div className="glass-card rounded-3xl p-6 border border-blue-200 space-y-4">
                                        <div className="border-b border-slate-200 pb-3">
                                            <h3 className="font-google font-bold text-lg text-blue-950 flex items-center">
                                                <i className="fa-solid fa-user-plus text-blue-600 mr-2"></i> Register New Account
                                            </h3>
                                            <p className="text-xs text-slate-500">Create a student, teacher, or admin account.</p>
                                        </div>

                                        {regMessage && (
                                            <div className="bg-emerald-50 border border-emerald-300 text-emerald-900 p-3 rounded-2xl text-xs font-bold flex items-center space-x-2">
                                                <i className="fa-solid fa-circle-check text-emerald-600"></i>
                                                <span>{regMessage}</span>
                                            </div>
                                        )}

                                        <form onSubmit={handleRegisterAccount} className="space-y-3 text-xs">
                                            <div>
                                                <label className="block font-bold text-slate-700 mb-1">Full Name *</label>
                                                <input
                                                    required
                                                    value={regForm.name}
                                                    onChange={(e) => setRegForm({...regForm, name: e.target.value})}
                                                    placeholder="e.g. Maria Santos"
                                                    className="w-full bg-slate-50 border border-slate-300 rounded-xl p-2.5 text-xs text-slate-800"
                                                />
                                            </div>

                                            <div className="grid grid-cols-2 gap-2">
                                                <div>
                                                    <label className="block font-bold text-slate-700 mb-1">ID Number *</label>
                                                    <input
                                                        required
                                                        value={regForm.studentIdNo}
                                                        onChange={(e) => setRegForm({...regForm, studentIdNo: e.target.value})}
                                                        placeholder="2025-09912"
                                                        className="w-full bg-slate-50 border border-slate-300 rounded-xl p-2.5 text-xs text-slate-800"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block font-bold text-slate-700 mb-1">Role *</label>
                                                    <select
                                                        value={regForm.role}
                                                        onChange={(e) => setRegForm({...regForm, role: e.target.value})}
                                                        className="w-full bg-slate-50 border border-slate-300 rounded-xl p-2.5 text-xs text-slate-800"
                                                    >
                                                        <option value="student">Student</option>
                                                        <option value="teacher">PE Instructor</option>
                                                        <option value="admin">Administrator</option>
                                                    </select>
                                                </div>
                                            </div>

                                            <div>
                                                <label className="block font-bold text-slate-700 mb-1">School Email *</label>
                                                <input
                                                    required
                                                    type="email"
                                                    value={regForm.email}
                                                    onChange={(e) => setRegForm({...regForm, email: e.target.value})}
                                                    placeholder="m.santos@student.edu.ph"
                                                    className="w-full bg-slate-50 border border-slate-300 rounded-xl p-2.5 text-xs text-slate-800"
                                                />
                                            </div>

                                            <button type="submit" className="w-full btn-navy-primary py-2.5 rounded-xl font-bold text-xs shadow mt-2">
                                                Complete Account Registration
                                            </button>
                                        </form>
                                    </div>

                                    {/* Registered System Accounts & Admin Transfer Panel */}
                                    <div className="lg:col-span-2 glass-card rounded-3xl p-6 border border-blue-200 space-y-4">
                                        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 border-b border-slate-200 pb-3">
                                            <div>
                                                <h3 className="font-google font-bold text-lg text-blue-950 flex items-center">
                                                    <i className="fa-solid fa-users-gear text-blue-600 mr-2"></i> System Accounts & Admin Roles
                                                </h3>
                                                <p className="text-xs text-slate-500">Assign admin privileges, transfer main department ownership, or switch personas.</p>
                                            </div>

                                            {isAdmin && (
                                                <span className="bg-amber-100 text-amber-900 border border-amber-300 text-[10px] font-extrabold px-3 py-1 rounded-full uppercase tracking-wider self-start sm:self-auto">
                                                    <i className="fa-solid fa-crown mr-1"></i> Admin Access Granted
                                                </span>
                                            )}
                                        </div>

                                        <div className="space-y-3">
                                            {accounts.map(acc => {
                                                const isCurrent = acc.id === currentUser.id;

                                                return (
                                                    <div
                                                        key={acc.id}
                                                        className={`p-4 rounded-2xl border transition-all flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 ${
                                                            isCurrent ? 'bg-blue-50/90 border-blue-400 shadow-sm' : 'bg-white border-slate-200'
                                                        }`}
                                                    >
                                                        <div className="flex items-center space-x-3">
                                                            <img src={acc.avatar} className="w-12 h-12 rounded-2xl object-cover border-2 border-blue-200" />
                                                            <div className="text-xs">
                                                                <div className="flex items-center space-x-2">
                                                                    <strong className="text-blue-950 text-sm">{acc.name}</strong>
                                                                    {acc.isPrimaryAdmin && (
                                                                        <span className="bg-amber-500 text-white text-[9px] font-black px-2 py-0.5 rounded-full uppercase">
                                                                            <i className="fa-solid fa-crown mr-1"></i> Primary Admin
                                                                        </span>
                                                                    )}
                                                                    {isCurrent && (
                                                                        <span className="bg-emerald-600 text-white text-[9px] font-extrabold px-2 py-0.5 rounded-full uppercase">
                                                                            Active Persona
                                                                        </span>
                                                                    )}
                                                                </div>
                                                                <span className="text-[11px] text-slate-500 font-mono block">ID: {acc.studentIdNo} • {acc.email}</span>
                                                            </div>
                                                        </div>

                                                        <div className="flex flex-wrap items-center gap-2 self-end sm:self-auto">
                                                            {/* DYNAMIC ROLE CHANGE CONTROL FOR ADMINS */}
                                                            {isAdmin ? (
                                                                <select
                                                                    value={acc.role}
                                                                    onChange={(e) => handleToggleAccountRole(acc.id, e.target.value)}
                                                                    className="bg-slate-100 border border-slate-300 text-slate-800 text-xs font-bold rounded-xl px-2 py-1.5 focus:outline-none"
                                                                >
                                                                    <option value="student">Student</option>
                                                                    <option value="teacher">PE Instructor</option>
                                                                    <option value="admin">Administrator</option>
                                                                </select>
                                                            ) : (
                                                                <span className="text-[10px] font-extrabold bg-blue-100 text-blue-800 px-2.5 py-1 rounded-full uppercase">
                                                                    {acc.role}
                                                                </span>
                                                            )}

                                                            {/* TRANSFER PRIMARY ADMIN BUTTON */}
                                                            {isAdmin && !acc.isPrimaryAdmin && (
                                                                <button
                                                                    onClick={() => setTransferAdminTarget(acc)}
                                                                    className="bg-amber-100 hover:bg-amber-200 text-amber-900 border border-amber-300 text-xs font-bold px-2.5 py-1.5 rounded-xl transition"
                                                                    title="Transfer Primary Admin Rights"
                                                                >
                                                                    <i className="fa-solid fa-crown"></i>
                                                                </button>
                                                            )}

                                                            <button
                                                                onClick={() => setCurrentUserId(acc.id)}
                                                                disabled={isCurrent}
                                                                className={`px-3 py-1.5 rounded-xl text-xs font-bold transition ${
                                                                    isCurrent ? 'bg-slate-200 text-slate-500 cursor-default' : 'btn-navy-primary shadow'
                                                                }`}
                                                            >
                                                                {isCurrent ? 'Logged In' : 'Switch Persona'}
                                                            </button>

                                                            {isAdmin && !acc.isPrimaryAdmin && (
                                                                <button
                                                                    onClick={() => setDeleteTarget({
                                                                        type: 'Account Profile',
                                                                        name: acc.name,
                                                                        onConfirm: () => setAccounts(prev => prev.filter(a => a.id !== acc.id))
                                                                    })}
                                                                    className="text-slate-400 hover:text-rose-600 p-1.5 transition"
                                                                    title="Delete Account"
                                                                >
                                                                    <i className="fa-solid fa-trash-can"></i>
                                                                </button>
                                                            )}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODAL: TRANSFER PRIMARY ADMIN RIGHTS */}
                    {transferAdminTarget && (
                        <div className="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="glass-card rounded-3xl max-w-sm w-full p-6 border border-amber-300 text-center space-y-4 shadow-2xl">
                                <div className="w-12 h-12 rounded-full bg-amber-100 border border-amber-300 text-amber-600 flex items-center justify-center text-xl mx-auto">
                                    <i className="fa-solid fa-crown"></i>
                                </div>
                                <h3 className="font-google font-bold text-lg text-slate-900">Transfer Primary Admin Role?</h3>
                                <p className="text-xs text-slate-600">
                                    Are you sure you want to transfer primary department ownership to <strong>{transferAdminTarget.name}</strong>?
                                </p>
                                <div className="flex space-x-2 pt-2">
                                    <button onClick={() => setTransferAdminTarget(null)} className="flex-1 py-2 font-bold text-slate-500 hover:bg-slate-100 rounded-xl text-xs">Cancel</button>
                                    <button
                                        onClick={() => handleTransferPrimaryAdmin(transferAdminTarget.id)}
                                        className="flex-1 py-2 font-bold bg-amber-600 hover:bg-amber-700 text-white rounded-xl text-xs shadow-md"
                                    >
                                        Transfer Ownership
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: DELETE CONFIRMATION */}
                    {deleteTarget && (
                        <div className="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="glass-card rounded-3xl max-w-sm w-full p-6 border border-blue-200 text-center space-y-4 shadow-2xl">
                                <div className="w-12 h-12 rounded-full bg-rose-100 border border-rose-300 text-rose-600 flex items-center justify-center text-xl mx-auto">
                                    <i className="fa-solid fa-triangle-exclamation"></i>
                                </div>
                                <h3 className="font-google font-bold text-lg text-slate-900">Remove {deleteTarget.type}?</h3>
                                <p className="text-xs text-slate-600">Are you sure you want to remove <strong>"{deleteTarget.name}"</strong>?</p>
                                <div className="flex space-x-2 pt-2">
                                    <button onClick={() => setDeleteTarget(null)} className="flex-1 py-2 font-bold text-slate-500 hover:bg-slate-100 rounded-xl text-xs">Cancel</button>
                                    <button
                                        onClick={() => {
                                            deleteTarget.onConfirm();
                                            setDeleteTarget(null);
                                        }}
                                        className="flex-1 py-2 font-bold bg-rose-600 hover:bg-rose-700 text-white rounded-xl text-xs shadow-md"
                                    >
                                        Delete
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
